<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#002652;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003f9e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6da0f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9ebef9;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle glow orbs -->
  <circle cx="900" cy="150" r="280" fill="#003f9e" opacity="0.35"/>
  <circle cx="200" cy="520" r="200" fill="#1a6de0" opacity="0.15"/>

  <!-- Grid pattern overlay -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left accent bar -->
  <rect x="64" y="64" width="4" height="80" rx="2" fill="url(#accent)"/>

  <!-- Logo mark -->
  <g transform="translate(84, 72)">
    <!-- T -->
    <text font-family="'Segoe UI', Arial, sans-serif" font-size="38" font-weight="800" fill="url(#accent)" letter-spacing="-1">T</text>
    <text x="22" font-family="'Segoe UI', Arial, sans-serif" font-size="38" font-weight="300" fill="#c5d9fc" letter-spacing="-1">ech</text>
    <!-- L -->
    <text x="86" font-family="'Segoe UI', Arial, sans-serif" font-size="38" font-weight="800" fill="url(#accent)" letter-spacing="-1">L</text>
    <text x="106" font-family="'Segoe UI', Arial, sans-serif" font-size="38" font-weight="300" fill="#c5d9fc" letter-spacing="-1">ens</text>
  </g>

  <!-- Badge -->
  <rect x="84" y="120" width="90" height="22" rx="11" fill="#1a6de0" opacity="0.5"/>
  <text x="129" y="135" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#9ebef9" text-anchor="middle" letter-spacing="1.5">B2B · 2026</text>

  <!-- Main headline -->
  <text x="84" y="240" font-family="'Segoe UI', Arial, sans-serif" font-size="62" font-weight="800" fill="#ffffff" letter-spacing="-2">기업 특허 동향을</text>
  <text x="84" y="316" font-family="'Segoe UI', Arial, sans-serif" font-size="62" font-weight="800" fill="url(#accent)" letter-spacing="-2">한눈에 파악하세요</text>

  <!-- Subtitle -->
  <text x="84" y="374" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="400" fill="#9ebef9" opacity="0.85">KIPRIS 공공데이터 기반 실시간 특허 검색·분석 플랫폼</text>

  <!-- Divider -->
  <line x1="84" y1="410" x2="480" y2="410" stroke="#4688f1" stroke-width="1" opacity="0.4"/>

  <!-- Feature pills -->
  <!-- Feature 1 -->
  <rect x="84" y="430" width="170" height="38" rx="19" fill="#003f9e" opacity="0.7" stroke="#4688f1" stroke-width="1" stroke-opacity="0.4"/>
  <text x="169" y="454" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="500" fill="#c5d9fc" text-anchor="middle">특허 검색·분석</text>

  <!-- Feature 2 -->
  <rect x="266" y="430" width="170" height="38" rx="19" fill="#003f9e" opacity="0.7" stroke="#4688f1" stroke-width="1" stroke-opacity="0.4"/>
  <text x="351" y="454" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="500" fill="#c5d9fc" text-anchor="middle">요약 분석 대시보드</text>

  <!-- Feature 3 -->
  <rect x="448" y="430" width="170" height="38" rx="19" fill="#003f9e" opacity="0.7" stroke="#4688f1" stroke-width="1" stroke-opacity="0.4"/>
  <text x="533" y="454" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="500" fill="#c5d9fc" text-anchor="middle">경쟁사 비교 분석</text>

  <!-- Feature 4 -->
  <rect x="84" y="480" width="170" height="38" rx="19" fill="#003f9e" opacity="0.7" stroke="#4688f1" stroke-width="1" stroke-opacity="0.4"/>
  <text x="169" y="504" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="500" fill="#c5d9fc" text-anchor="middle">관심특허 관리</text>

  <!-- Feature 5 -->
  <rect x="266" y="480" width="170" height="38" rx="19" fill="#003f9e" opacity="0.7" stroke="#4688f1" stroke-width="1" stroke-opacity="0.4"/>
  <text x="351" y="504" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="500" fill="#c5d9fc" text-anchor="middle">검색 프리셋 저장</text>

  <!-- URL bottom right -->
  <text x="1136" y="566" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="400" fill="#6da0f5" opacity="0.7" text-anchor="end">techlens-app.vercel.app</text>

  <!-- Right side — abstract chart visualization -->
  <g transform="translate(760, 100)">
    <!-- Card background -->
    <rect width="360" height="420" rx="16" fill="#003675" opacity="0.5" stroke="#4688f1" stroke-width="1" stroke-opacity="0.25"/>

    <!-- Card header -->
    <rect width="360" height="52" rx="16" fill="#002652" opacity="0.8"/>
    <rect x="0" y="36" width="360" height="16" fill="#002652" opacity="0.8"/>
    <text x="20" y="33" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#9ebef9">월별 출원 동향</text>
    <circle cx="330" cy="26" r="6" fill="#22C55E" opacity="0.8"/>

    <!-- Bar chart bars -->
    <g transform="translate(20, 72)">
      <!-- Bars -->
      <rect x="0"   y="160" width="22" height="80"  rx="3" fill="#1a6de0" opacity="0.6"/>
      <rect x="30"  y="130" width="22" height="110" rx="3" fill="#1a6de0" opacity="0.6"/>
      <rect x="60"  y="100" width="22" height="140" rx="3" fill="#1a6de0" opacity="0.7"/>
      <rect x="90"  y="70"  width="22" height="170" rx="3" fill="#4688f1" opacity="0.8"/>
      <rect x="120" y="90"  width="22" height="150" rx="3" fill="#1a6de0" opacity="0.7"/>
      <rect x="150" y="50"  width="22" height="190" rx="3" fill="#6da0f5" opacity="0.9"/>
      <rect x="180" y="40"  width="22" height="200" rx="3" fill="#6da0f5" opacity="1"/>
      <rect x="210" y="60"  width="22" height="180" rx="3" fill="#4688f1" opacity="0.85"/>
      <rect x="240" y="80"  width="22" height="160" rx="3" fill="#1a6de0" opacity="0.7"/>
      <rect x="270" y="30"  width="22" height="210" rx="3" fill="url(#accent)" opacity="1"/>
      <rect x="300" y="20"  width="22" height="220" rx="3" fill="url(#accent)" opacity="1"/>

      <!-- X labels -->
      <text x="11"  y="258" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#6da0f5" opacity="0.6" text-anchor="middle">1월</text>
      <text x="71"  y="258" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#6da0f5" opacity="0.6" text-anchor="middle">3월</text>
      <text x="131" y="258" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#6da0f5" opacity="0.6" text-anchor="middle">5월</text>
      <text x="191" y="258" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#6da0f5" opacity="0.6" text-anchor="middle">7월</text>
      <text x="251" y="258" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#6da0f5" opacity="0.6" text-anchor="middle">9월</text>
      <text x="311" y="258" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#6da0f5" opacity="0.6" text-anchor="middle">11월</text>
    </g>

    <!-- Bottom stats -->
    <line x1="20" y1="360" x2="340" y2="360" stroke="#4688f1" stroke-width="0.5" opacity="0.3"/>
    <g transform="translate(20, 380)">
      <text x="0"   y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#9ebef9" opacity="0.6">총 특허</text>
      <text x="0"   y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">1,284건</text>
      <text x="110" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#9ebef9" opacity="0.6">등록률</text>
      <text x="110" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#22C55E">68.4%</text>
      <text x="220" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#9ebef9" opacity="0.6">월평균</text>
      <text x="220" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="url(#accent)">107건</text>
    </g>
  </g>
</svg>
